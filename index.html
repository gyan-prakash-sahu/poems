<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry & Articles</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Added collection, addDoc, query, where, getDocs, serverTimestamp for comments
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, collection, addDoc, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBbtKgOCP6iFc3Kw_PI7xLaF2HaX--XXC4",
            authDomain: "poem-website-56360.firebaseapp.com",
            projectId: "poem-website-56360",
            storageBucket: "poem-website-56360.firebasestorage.app",
            messagingSenderId: "462671480081",
            appId: "1:462671480081:web:505b5cfb7744477c8578b0"
          };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Export everything to window so our router can use it
        window.firebaseDB = db;
        window.firebaseDoc = doc;
        window.firebaseGetDoc = getDoc;
        window.firebaseSetDoc = setDoc;
        window.firebaseUpdateDoc = updateDoc;
        window.firebaseIncrement = increment;
        
        // New exports for comments
        window.firebaseCollection = collection;
        window.firebaseAddDoc = addDoc;
        window.firebaseQuery = query;
        window.firebaseWhere = where;
        window.firebaseGetDocs = getDocs;
        window.firebaseServerTimestamp = serverTimestamp;
    </script>

    <style>
        /* Custom Styles to enhance the poetry aesthetic */
        body { font-family: 'EB Garamond', serif; color: #1a1a1a; margin: 0; padding: 0; }
        h1, h2, h3, .title-font { font-family: 'Cormorant Garamond', serif; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .glass-card:hover { background: rgba(255, 255, 255, 0.5); }

        .content-text { white-space: pre-wrap; line-height: 2.2; font-size: 1.25rem; }
        #background-layer { transition: background-image 0.8s ease-in-out; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.4); }

        /* Style for the Like button to animate when clicked */
        .liked i { fill: #ef4444; color: #ef4444; } /* Turns heart red */

        .like-btn { transition: transform 0.2s; cursor: pointer; }
        .like-btn:active { transform: scale(0.9); }
        .liked svg { fill: #ef4444; stroke: #ef4444; transition: all 0.3s ease; } /* Turns heart solid red */

        /* Comment Input Aesthetics */
        .comment-input {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #1c1917;
            transition: all 0.2s ease;
        }
        .comment-input:focus {
            outline: none;
            border-color: rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.7);
        }
        .comment-input::placeholder { color: #78716c; }
    </style>
</head>
<body class="antialiased min-h-screen relative selection:bg-stone-300 selection:text-stone-900">

    <div id="background-layer" class="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat" style="background-image: url('');">
        <div class="absolute inset-0 bg-black/20"></div>
    </div>

    <main class="relative z-10 min-h-screen py-12 px-4 sm:px-6 lg:px-8 flex flex-col items-center">
        <div id="app" class="w-full max-w-4xl glass-panel rounded-2xl p-8 sm:p-12 min-h-[80vh] transition-opacity duration-300">
            </div>
        <footer class="mt-8 text-center text-white/80 text-sm drop-shadow-md">
            <p id="footer-text"></p>
        </footer>
    </main>

    <script>
        // Data State
        let SiteConfig = {};
        let Poems = [];
        let Articles = [];
        
        // Settings
        const ITEMS_PER_PAGE = 5;
        const HOME_PREVIEW_LIMIT = 4;

        const appDiv = document.getElementById('app');
        const bgLayer = document.getElementById('background-layer');

        // Function to load data from JSON
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                SiteConfig = data.config;
                Poems = data.poems || [];
                Articles = data.articles || [];

                document.title = SiteConfig.siteTitle;
                document.getElementById('footer-text').innerText = `© ${new Date().getFullYear()} ${SiteConfig.author.name}. All rights reserved.`;

                handleRoute();
                window.addEventListener('hashchange', handleRoute);
                
            } catch (error) {
                appDiv.innerHTML = `<div class="text-center py-20"><h1>Cannot Load Content</h1></div>`;
                console.error("Error loading JSON:", error);
            }
        }

        const sortItemsByDate = (items) => {
            return items.slice().sort((a, b) => new Date(b.date) - new Date(a.date));
        };

        function getSocialLinksHTML() {
            if (!SiteConfig.author || !SiteConfig.author.socials) return '';
            return SiteConfig.author.socials.map(social => `
                <a href="${social.url}" target="_blank" rel="noopener noreferrer" 
                   class="text-stone-800 hover:text-stone-500 transition-colors p-2">
                    <i data-lucide="${social.icon}" class="w-5 h-5"></i>
                </a>
            `).join('');
        }

        function generateMiniList(items, prefix) {
            if (items.length === 0) return `<p class="text-stone-600 italic py-4">Coming soon...</p>`;
            return items.map(item => `
                <a href="#${prefix}-${item.id}" class="group block py-3 border-b border-stone-800/10 last:border-0 hover:pl-2 transition-all">
                    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-baseline">
                        <h4 class="title-font text-xl text-stone-900 group-hover:text-stone-600 transition-colors">${item.title}</h4>
                        ${item.date ? `<span class="text-xs text-stone-600 italic mt-1 sm:mt-0">${item.date}</span>` : ''}
                    </div>
                </a>
            `).join('');
        }

        function renderHome() {
            bgLayer.style.backgroundImage = `url('${SiteConfig.defaultBackground}')`;
            const sortedPoems = sortItemsByDate(Poems).slice(0, HOME_PREVIEW_LIMIT);
            const sortedArticles = sortItemsByDate(Articles).slice(0, HOME_PREVIEW_LIMIT);

            return `
                <div class="animate-fade-in">
                    <div class="flex flex-col md:flex-row items-center md:items-start gap-8 border-b border-stone-800/20 pb-10 mb-10">
                        <img src="${SiteConfig.author.photo}" alt="${SiteConfig.author.name}" 
                             class="w-32 h-32 rounded-full object-cover shadow-md border-4 border-white/50">
                        <div class="text-center md:text-left flex-1">
                            <h1 class="title-font text-5xl mb-3 text-stone-900">${SiteConfig.siteTitle}</h1>
                            <h2 class="text-xl text-stone-800 italic mb-4">By ${SiteConfig.author.name}</h2>
                            <p class="text-stone-800 leading-relaxed mb-4 text-lg max-w-2xl">${SiteConfig.author.bio}</p>
                            <div class="flex justify-center md:justify-start -ml-2">
                                ${getSocialLinksHTML()}
                            </div>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="glass-card rounded-2xl p-6 flex flex-col h-full shadow-sm">
                            <div class="flex justify-between items-center mb-6 border-b border-stone-800/20 pb-2">
                                <h2 class="title-font text-3xl text-stone-900 font-semibold flex items-center">
                                    <i data-lucide="feather" class="w-5 h-5 mr-3 opacity-70"></i> Poetry
                                </h2>
                            </div>
                            <div class="flex-grow flex flex-col">${generateMiniList(sortedPoems, 'poem')}</div>
                            <div class="mt-6 text-center pt-4 border-t border-stone-800/10">
                                <a href="#poems/1" class="inline-flex items-center text-stone-700 hover:text-stone-900 font-medium tracking-wide transition-colors">
                                    Read All Poetry <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
                                </a>
                            </div>
                        </div>

                        <div class="glass-card rounded-2xl p-6 flex flex-col h-full shadow-sm">
                            <div class="flex justify-between items-center mb-6 border-b border-stone-800/20 pb-2">
                                <h2 class="title-font text-3xl text-stone-900 font-semibold flex items-center">
                                    <i data-lucide="book-open" class="w-5 h-5 mr-3 opacity-70"></i> Articles
                                </h2>
                            </div>
                            <div class="flex-grow flex flex-col">${generateMiniList(sortedArticles, 'article')}</div>
                            <div class="mt-6 text-center pt-4 border-t border-stone-800/10">
                                <a href="#articles/1" class="inline-flex items-center text-stone-700 hover:text-stone-900 font-medium tracking-wide transition-colors">
                                    Read All Articles <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPagination(type, currentPage, totalPages) {
            if (totalPages <= 1) return '';
            let html = '<div class="flex justify-center flex-wrap gap-2 mt-12">';
            for (let i = 1; i <= totalPages; i++) {
                const activeClass = i === currentPage ? 'bg-stone-800 text-white shadow-md' : 'bg-white/40 hover:bg-white/70 text-stone-800';
                html += `<a href="#${type}/${i}" class="w-10 h-10 flex items-center justify-center rounded-full transition-all ${activeClass} font-medium">${i}</a>`;
            }
            html += '</div>';
            return html;
        }

        function renderListPage(type, pageStr) {
            bgLayer.style.backgroundImage = `url('${SiteConfig.defaultBackground}')`;
            const currentPage = parseInt(pageStr) || 1;
            const isPoem = type === 'poems';
            const itemsList = isPoem ? Poems : Articles;
            const sortedItems = sortItemsByDate(itemsList);
            const title = isPoem ? 'Complete Poetry Collection' : 'All Articles & Essays';
            const prefix = isPoem ? 'poem' : 'article';
            const icon = isPoem ? 'feather' : 'book-open';
            
            const totalPages = Math.ceil(sortedItems.length / ITEMS_PER_PAGE);
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const paginatedItems = sortedItems.slice(startIndex, startIndex + ITEMS_PER_PAGE);

            const listHTML = paginatedItems.map(item => `
                <a href="#${prefix}-${item.id}" class="group block py-6 border-b border-stone-800/20 last:border-0 hover:bg-white/30 rounded-lg px-6 -mx-6 transition-colors">
                    <div class="flex flex-col sm:flex-row justify-between items-baseline mb-2">
                        <h3 class="title-font text-3xl text-stone-900 group-hover:text-stone-600 transition-colors">${item.title}</h3>
                        ${item.date ? `<span class="text-sm text-stone-700 italic sm:ml-4">${item.date}</span>` : ''}
                    </div>
                    <p class="text-stone-600 line-clamp-2 mt-2 font-serif text-lg">
                        ${Array.isArray(item.text) ? item.text[0] : item.text.split('\n')[0]}...
                    </p>
                </a>
            `).join('');

            return `
                <div class="animate-fade-in max-w-3xl mx-auto">
                    <a href="#home" class="inline-flex items-center text-stone-800 hover:text-stone-500 transition-colors mb-8 font-medium tracking-wide">
                        <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Return Home
                    </a>
                    <div class="mb-10 flex items-center border-b border-stone-800/30 pb-6">
                        <i data-lucide="${icon}" class="w-8 h-8 mr-4 text-stone-800 opacity-80"></i>
                        <h1 class="title-font text-4xl sm:text-5xl text-stone-900">${title}</h1>
                    </div>
                    <div class="flex flex-col">${paginatedItems.length > 0 ? listHTML : '<p class="text-stone-600 italic">No entries found.</p>'}</div>
                    ${renderPagination(type, currentPage, totalPages)}
                </div>
            `;
        }

        // ==========================================
        // UPDATED renderItemPage WITH FIREBASE LIKES
        // ==========================================
        function renderItemPage(item, backListType) {
            const bgImage = item.background && item.background.trim() !== "" ? item.background : SiteConfig.defaultBackground;
            bgLayer.style.backgroundImage = `url('${bgImage}')`;
            const formattedText = Array.isArray(item.text) ? item.text.join('\n') : item.text;
            const backLinkText = backListType === 'poems' ? 'Return to Poetry' : 'Return to Articles';

            // Check if user has already liked this item during this session
            const hasLiked = localStorage.getItem(`liked_${item.id}`);

            // Wait a moment for the DOM to render, then fetch likes
            const loadFirebaseData = () => {
                // If Firebase is ready, fetch the likes and comments
                if (window.firebaseDB) {
                    fetchLikes(item.id);
                    if (window.fetchComments) fetchComments(item.id); // Ensure comments are fetched too!
                } else {
                    // If Firebase isn't ready yet, check again in 100 milliseconds
                    setTimeout(loadFirebaseData, 100);
                }
            };
            
            // Start the smart loader after a tiny delay to ensure the HTML is painted
            setTimeout(loadFirebaseData, 50);

            return `
                <div class="animate-fade-in max-w-2xl mx-auto">
                    <a href="#${backListType}/1" class="inline-flex items-center text-stone-800 hover:text-stone-500 transition-colors mb-10 font-medium tracking-wide">
                        <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> ${backLinkText}
                    </a>

                    <div class="mb-10 text-center">
                        <h1 class="title-font text-5xl sm:text-6xl text-stone-900 mb-4">${item.title}</h1>
                        ${item.date ? `<p class="text-stone-700 italic text-lg">${item.date}</p>` : ''}
                        <div class="w-20 h-px bg-stone-800/30 mx-auto mt-8"></div>
                    </div>

                    <div class="content-text text-stone-900 ${backListType === 'poems' ? 'flex justify-center' : ''}">
                        <div>${formattedText}</div>
                    </div>
                    
                    <div class="mt-12 flex justify-center items-center gap-3">
                        <button id="like-btn-${item.id}" 
                                onclick="handleLike('${item.id}')" 
                                class="like-btn flex items-center justify-center w-12 h-12 rounded-full bg-white/50 border border-stone-800/20 hover:bg-white shadow-sm ${hasLiked ? 'liked' : ''}">
                            <i data-lucide="heart" class="w-6 h-6 text-stone-700"></i>
                        </button>
                        <span id="like-count-${item.id}" class="text-stone-700 font-medium text-lg">...</span>
                    </div>

                    <div class="mt-16 pt-10 border-t border-stone-800/20">
                        <h3 class="title-font text-3xl text-stone-900 mb-6 flex items-center">
                            <i data-lucide="message-circle" class="w-6 h-6 mr-3 opacity-70"></i> Reflections
                        </h3>
                        
                        <div class="glass-card rounded-xl p-6 mb-10">
                            <div class="grid gap-4">
                                <input type="text" id="comment-name-${item.id}" placeholder="Your Name (optional)" class="comment-input w-full px-4 py-3 rounded-lg font-serif text-lg">
                                <textarea id="comment-text-${item.id}" placeholder="Leave a thought..." rows="3" class="comment-input w-full px-4 py-3 rounded-lg font-serif resize-none text-lg"></textarea>
                                <button onclick="handleComment('${item.id}', event)" class="bg-stone-800 hover:bg-stone-700 text-white px-6 py-2 rounded-lg font-medium tracking-wide transition-colors self-end sm:w-auto w-full">
                                    Post Reflection
                                </button>
                            </div>
                        </div>

                        <div id="comments-list-${item.id}" class="space-y-6">
                            <p class="text-stone-600 italic">Loading reflections...</p>
                        </div>
                    </div>

                    <div class="mt-8 text-center text-stone-800">
                        <i data-lucide="feather" class="w-6 h-6 mx-auto opacity-70"></i>
                    </div>
                </div>
            `;
        }

        // --- FIREBASE LOGIC FUNCTIONS ---
        
        async function fetchLikes(itemId) {
            if (!window.firebaseDB) return; // Wait for Firebase to load
            
            const docRef = window.firebaseDoc(window.firebaseDB, "likes", itemId);
            try {
                const docSnap = await window.firebaseGetDoc(docRef);
                const countElement = document.getElementById(`like-count-${itemId}`);
                
                if (docSnap.exists() && countElement) {
                    countElement.innerText = docSnap.data().count + " Likes";
                } else if (countElement) {
                    // Document doesn't exist yet, meaning 0 likes
                    countElement.innerText = "0 Likes";
                    // Create the document initializing at 0
                    await window.firebaseSetDoc(docRef, { count: 0 });
                }
            } catch (error) {
                console.error("Error fetching likes:", error);
            }
        }

        window.handleLike = async function(itemId) {
            // Prevent multiple likes from the same browser
            if (localStorage.getItem(`liked_${itemId}`)) return;

            const btnElement = document.getElementById(`like-btn-${itemId}`);
            const countElement = document.getElementById(`like-count-${itemId}`);
            
            // Optimistic UI update (make it turn red and add 1 immediately for snappy feel)
            btnElement.classList.add('liked');
            let currentCount = parseInt(countElement.innerText) || 0;
            countElement.innerText = (currentCount + 1) + " Likes";
            
            // Mark as liked in local storage
            localStorage.setItem(`liked_${itemId}`, "true");

            // Update Firebase
            const docRef = window.firebaseDoc(window.firebaseDB, "likes", itemId);
            try {
                await window.firebaseUpdateDoc(docRef, {
                    count: window.firebaseIncrement(1)
                });
            } catch (error) {
                console.error("Error updating likes:", error);
                // If it fails, revert UI
                btnElement.classList.remove('liked');
                countElement.innerText = currentCount + " Likes";
                localStorage.removeItem(`liked_${itemId}`);
            }
        };

        // --- COMMENT LOGIC FUNCTIONS ---
        
        window.fetchComments = async function(itemId) {
            if (!window.firebaseDB) return;
            const listEl = document.getElementById(`comments-list-${itemId}`);
            if (!listEl) return;

            try {
                // Fetch all comments for this specific poem/article
                const q = window.firebaseQuery(
                    window.firebaseCollection(window.firebaseDB, "comments"),
                    window.firebaseWhere("itemId", "==", itemId)
                );
                const querySnapshot = await window.firebaseGetDocs(q);
                
                let comments = [];
                querySnapshot.forEach(doc => comments.push({ id: doc.id, ...doc.data() }));

                if (comments.length === 0) {
                    listEl.innerHTML = '<p class="text-stone-600 italic">No reflections yet. Be the first to share your thoughts.</p>';
                    return;
                }

                // Sort by newest first using JS to avoid complex Firebase index setup
                comments.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.toMillis() : Date.now();
                    const timeB = b.timestamp ? b.timestamp.toMillis() : Date.now();
                    return timeB - timeA;
                });

                // Render the comments
                let html = '';
                comments.forEach(data => {
                    // Create a beautiful date and time string
                    let dateStr = 'Just now';
                    
                    if (data.timestamp) {
                        // Convert Firebase Timestamp to a standard JavaScript Date
                        const jsDate = data.timestamp.toDate();
                        
                        // Format it beautifully: "Mar 7, 2026, 8:23 AM"
                        dateStr = jsDate.toLocaleDateString('en-US', { 
                            year: 'numeric', 
                            month: 'short', 
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                    }
                    
                    html += `
                        <div class="border-b border-stone-800/10 pb-6 last:border-0 animate-fade-in">
                            <div class="flex flex-col sm:flex-row sm:items-baseline sm:justify-between mb-3">
                                <span class="title-font text-2xl text-stone-900 font-semibold">${data.author}</span>
                                <span class="text-sm text-stone-500 italic mt-1 sm:mt-0 flex items-center">
                                    <i data-lucide="clock" class="w-3 h-3 mr-1 opacity-70"></i> ${dateStr}
                                </span>
                            </div>
                            <p class="text-stone-700 font-serif text-lg leading-relaxed">${data.text.replace(/\n/g, '<br>')}</p>
                        </div>
                    `;
                });
                
                listEl.innerHTML = html;
                lucide.createIcons(); // Refresh icons if any

            } catch (error) {
                console.error("Error fetching comments:", error);
                listEl.innerHTML = '<p class="text-red-500/80 italic">Could not load reflections at this time.</p>';
            }
        };

        window.handleComment = async function(itemId, event) {
            const nameInput = document.getElementById(`comment-name-${itemId}`);
            const textInput = document.getElementById(`comment-text-${itemId}`);
            const authorName = nameInput.value.trim() || "Wanderer";
            const commentText = textInput.value.trim();
            
            if (!commentText) return; // Don't submit empty comments

            const btn = event.target;
            const originalBtnText = btn.innerText;
            btn.innerText = "Posting...";
            btn.disabled = true;

            try {
                await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDB, "comments"), {
                    itemId: itemId,
                    author: authorName,
                    text: commentText,
                    timestamp: window.firebaseServerTimestamp()
                });
                
                // Clear the form
                nameInput.value = '';
                textInput.value = '';
                
                // Refresh the list immediately
                await fetchComments(itemId);
            } catch (error) {
                console.error("Error posting comment:", error);
                alert("Something went wrong while posting your reflection.");
            } finally {
                btn.innerText = originalBtnText;
                btn.disabled = false;
            }
        };

        // Router function to handle navigation
        function handleRoute() {
            const hash = window.location.hash;
            appDiv.style.opacity = 0;
            
            setTimeout(() => {
                if (!hash || hash === '#home') {
                    appDiv.innerHTML = renderHome();
                } else if (hash.startsWith('#poems/')) {
                    const page = hash.split('/')[1];
                    appDiv.innerHTML = renderListPage('poems', page);
                } else if (hash.startsWith('#articles/')) {
                    const page = hash.split('/')[1];
                    appDiv.innerHTML = renderListPage('articles', page);
                } else if (hash.startsWith('#poem-')) {
                    const id = hash.replace('#poem-', '');
                    const poem = Poems.find(p => p.id === id);
                    if (poem) appDiv.innerHTML = renderItemPage(poem, 'poems');
                    else renderNotFound();
                } else if (hash.startsWith('#article-')) {
                    const id = hash.replace('#article-', '');
                    const article = Articles.find(a => a.id === id);
                    if (article) appDiv.innerHTML = renderItemPage(article, 'articles');
                    else renderNotFound();
                } else {
                    renderNotFound();
                }
                
                lucide.createIcons();
                appDiv.style.opacity = 1;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 150);
        }

        function renderNotFound() {
            appDiv.innerHTML = `
                <div class="text-center py-20 animate-fade-in">
                    <h1 class="title-font text-4xl mb-4 text-stone-900">Page Not Found</h1>
                    <p class="mb-8 text-stone-800">The words you are looking for have drifted away.</p>
                    <a href="#home" class="text-stone-800 hover:text-stone-500 border-b border-stone-800/50 pb-1">Return Home</a>
                </div>
            `;
        }

        // Add CSS for fade-in animation
        const style = document.createElement('style');
        style.innerHTML = `
            .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

        // START THE APP
        loadData();

    </script>
</body>
</html>
